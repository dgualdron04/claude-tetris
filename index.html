<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="title-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-switch" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="new-record-form" class="hidden">
          <input type="text" id="player-name-input" maxlength="12" placeholder="Tu nombre" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div id="overlay-scores-panel" class="scores-panel hidden">
          <div class="best-stats">
            <div>
              <span class="label">MEJOR COMBO</span>
              <span class="value" id="overlay-best-combo">0</span>
            </div>
            <div>
              <span class="label">MÁS LÍNEAS</span>
              <span class="value" id="overlay-best-lines">0</span>
            </div>
          </div>
          <span class="label">TOP 5</span>
          <ol class="scores-list" id="overlay-scores-list"></ol>
          <button id="overlay-reset-scores-btn" class="secondary-btn">Resetear records</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>

        <div class="scores-panel">
          <div class="best-stats">
            <div>
              <span class="label">MEJOR COMBO</span>
              <span class="value" id="start-best-combo">0</span>
            </div>
            <div>
              <span class="label">MÁS LÍNEAS</span>
              <span class="value" id="start-best-lines">0</span>
            </div>
          </div>
          <span class="label">TOP 5</span>
          <ol class="scores-list" id="start-scores-list"></ol>
          <button id="start-reset-scores-btn" class="secondary-btn">Resetear records</button>
        </div>

        <button id="play-btn">Jugar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
